<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>璁拌处鏈?/title>
<style>
:root{--bg:#f5f3f0;--card:#fff;--text:#2d2a26;--muted:#8b857b;--border:#e5e0d8;--accent:#d4942a;--accent-light:#fef3e4}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;-webkit-tap-highlight-color:transparent}
.header{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 16px;border-bottom:1px solid var(--border);text-align:center}
.header h1{font-size:20px;font-weight:800}
.stats-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto}
.stat-card{flex:1;min-width:90px;background:var(--card);border-radius:12px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-card .amount{font-size:18px;font-weight:800;color:var(--text)}
.stat-card .label{font-size:11px;color:var(--muted);margin-top:2px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;display:flex;background:var(--card);border-top:1px solid var(--border);z-index:10}
.tab-btn{flex:1;padding:12px 8px;border:none;background:none;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s;font-family:inherit}
.tab-btn.active{color:var(--accent);font-weight:700}
.tab-btn .tab-icon{display:block;font-size:20px;margin-bottom:2px}
.view{display:none;padding:12px 16px}
.view.active{display:block}
.form-card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.form-card .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.field{flex:1;min-width:80px;margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--accent)}
.btn-add{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-add:active{opacity:.8}
.recent-items{margin-top:12px}
.recent-items .title{font-size:11px;color:var(--muted);margin-bottom:6px}
.quick-tags{display:flex;flex-wrap:wrap;gap:6px}
.quick-tag{font-size:12px;padding:5px 12px;border-radius:16px;background:var(--bg);border:1px solid var(--border);color:var(--text);cursor:pointer}
.quick-tag:active{background:var(--accent-light);border-color:var(--accent)}
.cat-select{display:flex;flex-wrap:wrap;gap:6px}
.cat-chip{font-size:12px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .2s}
.cat-chip.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:700}
.day-block{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.day-date{font-weight:700;font-size:15px}
.day-total{font-size:17px;font-weight:800;color:var(--accent)}
.time-slot{margin-bottom:8px}
.time-slot-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px}
.expense-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:14px}
.expense-row .item{flex:1}
.expense-row .price{color:var(--text);font-weight:500;margin-left:8px}
.cat-breakdown{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;padding-top:8px;border-top:1px solid var(--border)}
.cat-chip-sm{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted)}
.period-block{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.period-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.period-title{font-size:14px;font-weight:700}
.period-total{font-size:18px;font-weight:800;color:var(--accent)}
.period-cats{display:flex;flex-wrap:wrap;gap:8px}
.period-cat{font-size:12px;color:var(--muted)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:16px;margin-bottom:6px}
.month-selector{display:flex;gap:8px;overflow-x:auto;padding:8px 16px;-webkit-overflow-scrolling:touch}
.month-chip{font-size:13px;padding:7px 16px;border-radius:20px;white-space:nowrap;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .2s}
.month-chip.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:700}
</style>
</head>
<body>

<div class="header"><h1>馃搾 璁拌处鏈?/h1></div>
<div class="stats-bar">
<div class="stat-card"><div class="amount" id="statToday">楼0</div><div class="label">浠婃棩</div></div>
<div class="stat-card"><div class="amount" id="statWeek">楼0</div><div class="label">鏈懆</div></div>
<div class="stat-card"><div class="amount" id="statMonth">楼0</div><div class="label">鏈湀</div></div>
</div>

<div class="view active" id="viewAdd">
<div class="form-card">
<div class="row">
<div class="field" style="min-width:100px"><label>馃搮 鏃ユ湡</label><input type="date" id="expDate"></div>
<div class="field" style="min-width:80px"><label>鈴?鏃舵</label><select id="expSlot"><option value="涓婂崍">涓婂崍</option><option value="涓崍">涓崍</option><option value="涓嬪崍" selected>涓嬪崍</option></select></div>
</div>
<div class="field"><label>馃彿锔?鍒嗙被</label>
<div class="cat-select" id="catSelect">
<span class="cat-chip active" data-cat="楗">馃崪 楗</span>
<span class="cat-chip" data-cat="濞变箰">馃幃 濞变箰</span>
<span class="cat-chip" data-cat="鍑鸿">馃殗 鍑鸿</span>
<span class="cat-chip" data-cat="鐢熸椿鐢ㄥ搧">馃彔 鐢熸椿鐢ㄥ搧</span>
<span class="cat-chip" data-cat="姘存灉">馃崕 姘存灉</span>
<span class="cat-chip" data-cat="鎴跨">馃彙 鎴跨</span>
<span class="cat-chip" data-cat="鍏朵粬">馃摝 鍏朵粬</span>
</div>
</div>
<div class="row">
<div class="field" style="flex:2"><label>馃摑 椤圭洰</label><input type="text" id="expItem" placeholder="鍖呭瓙+楦¤泲 / 鍦伴搧 / 璇濊垂"></div>
<div class="field" style="flex:1;min-width:70px"><label>馃挵 閲戦</label><input type="number" id="expAmount" placeholder="0.00" step="0.01" min="0"></div>
</div>
<button class="btn-add" onclick="addExpense()">鉁?璁颁竴绗?/button>
<div class="recent-items" id="recentItems"></div>
</div>
</div>

<div class="view" id="viewDaily"></div>
<div class="view" id="viewWeekly"></div>
<div class="view" id="viewMonthly">
<div class="month-selector" id="monthSelector"></div>
<div id="monthContent"></div>
</div>

<div class="tab-bar">
<button class="tab-btn active" data-view="viewAdd" onclick="switchTab('viewAdd',this)"><span class="tab-icon">鉁忥笍</span>璁拌处</button>
<button class="tab-btn" data-view="viewDaily" onclick="switchTab('viewDaily',this)"><span class="tab-icon">馃搮</span>姣忔棩</button>
<button class="tab-btn" data-view="viewWeekly" onclick="switchTab('viewWeekly',this)"><span class="tab-icon">馃搳</span>姣忓懆</button>
<button class="tab-btn" data-view="viewMonthly" onclick="switchTab('viewMonthly',this)"><span class="tab-icon">馃搱</span>姣忔湀</button>
</div>

<script>
var CATEGORIES=['楗','濞变箰','鍑鸿','鐢熸椿鐢ㄥ搧','姘存灉','鎴跨','鍏朵粬'];
var selectedCat='楗';
var expenses=[];
function load(){try{expenses=JSON.parse(localStorage.getItem('ledger_data')||'[]')}catch(e){expenses=[]}}
function save(){localStorage.setItem('ledger_data',JSON.stringify(expenses))}

function addExpense(){
var date=document.getElementById('expDate').value||todayStr();
var slot=document.getElementById('expSlot').value;
var item=document.getElementById('expItem').value.trim();
var amount=parseFloat(document.getElementById('expAmount').value);
if(!item)return alert('璇疯緭鍏ラ」鐩悕绉?);
if(!amount||amount<=0)return alert('璇疯緭鍏ユ湁鏁堥噾棰?);
expenses.push({date:date,slot:slot,item:item,amount:amount,cat:selectedCat,id:Date.now()});
save();
document.getElementById('expItem').value='';
document.getElementById('expAmount').value='';
renderAll();
}

function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtY(d){return parseInt(d.split('-')[0])}
function fmtM(d){return parseInt(d.split('-')[1])}
function fmtD(d){return parseInt(d.split('-')[2])}
function fmtDate(d){var p=d.split('-');return p[0]+'.'+parseInt(p[1])+'.'+parseInt(p[2])}
var WEEKDAYS=['鍛ㄦ棩','鍛ㄤ竴','鍛ㄤ簩','鍛ㄤ笁','鍛ㄥ洓','鍛ㄤ簲','鍛ㄥ叚'];
function weekday(d){return WEEKDAYS[new Date(fmtY(d),fmtM(d)-1,fmtD(d)).getDay()]}
function formatWeek(dates){if(!dates.length)return'';var s=[].concat(dates).sort();return fmtDate(s[0])+'-'+fmtDate(s[s.length-1])}
function getWeekKey(date){var d=new Date(fmtY(date),fmtM(date)-1,fmtD(date));var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);var mon=new Date(d.setDate(diff));return mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0')}

function renderAll(){
if(!expenses.length)return renderEmptyAll();
renderStats();renderDaily();renderWeekly();renderMonthly();renderRecentItems();
}
function renderEmptyAll(){
document.getElementById('statToday').textContent='楼0';
document.getElementById('statWeek').textContent='楼0';
document.getElementById('statMonth').textContent='楼0';
document.getElementById('viewDaily').innerHTML='<div class="empty"><div class="empty-icon">馃摑</div><h3>杩樻病鏈夎璐?/h3><p>鍦ㄣ€岃璐︺€嶉€夐」鍗′腑娣诲姞绗竴鏉¤褰曞惂</p></div>';
document.getElementById('viewWeekly').innerHTML='<div class="empty"><div class="empty-icon">馃搳</div><h3>鏆傛棤鏁版嵁</h3></div>';
document.getElementById('monthContent').innerHTML='';
document.getElementById('monthSelector').innerHTML='';
}
function renderStats(){
var today=todayStr();
var t=expenses.filter(function(e){return e.date===today});
document.getElementById('statToday').textContent='楼'+t.reduce(function(s,e){return s+e.amount},0).toFixed(2);
var wk=getWeekKey(today);
var w=expenses.filter(function(e){return getWeekKey(e.date)===wk});
document.getElementById('statWeek').textContent='楼'+w.reduce(function(s,e){return s+e.amount},0).toFixed(2);
var tm=todayStr().slice(0,7);
var m=expenses.filter(function(e){return e.date.slice(0,7)===tm});
document.getElementById('statMonth').textContent='楼'+m.reduce(function(s,e){return s+e.amount},0).toFixed(2);
}
function renderDaily(){
var dates=Array.from(new Set(expenses.map(function(e){return e.date}))).sort().reverse();
var html='';
for(var i=0;i<dates.length;i++){
var date=dates[i];
var dayEx=expenses.filter(function(e){return e.date===date}).sort(function(a,b){return ['涓婂崍','涓崍','涓嬪崍'].indexOf(a.slot)-['涓婂崍','涓崍','涓嬪崍'].indexOf(b.slot)});
var total=dayEx.reduce(function(s,e){return s+e.amount},0);
var slots={};
dayEx.forEach(function(e){if(!slots[e.slot])slots[e.slot]=[];slots[e.slot].push(e)});
var cats={};
dayEx.forEach(function(e){cats[e.cat]=(cats[e.cat]||0)+e.amount});
html+='<div class="day-block"><div class="day-header"><span class="day-date">'+fmtDate(date)+' '+weekday(date)+'</span><span class="day-total">鍏?+total.toFixed(2)+'鍏?/span></div>';
['涓婂崍','涓崍','涓嬪崍'].forEach(function(slot){
if(!slots[slot])return;
var items=slots[slot].map(function(e){return e.item+e.amount.toFixed(2)+'鍏?}).join('锛?);
html+='<div class="time-slot"><span class="time-slot-label">'+slot+'锛?/span>'+items+'</div>';
});
html+='<div class="cat-breakdown">';
Object.keys(cats).forEach(function(cat){html+='<span class="cat-chip-sm">'+cat+'锛?+cats[cat].toFixed(2)+'鍏?/span>'});
html+='</div></div>';
}
document.getElementById('viewDaily').innerHTML=html;
}
function renderWeekly(){
var weeks={};
expenses.forEach(function(e){var wk=getWeekKey(e.date);if(!weeks[wk])weeks[wk]=[];weeks[wk].push(e)});
var sorted=Object.keys(weeks).sort().reverse();
var html='';
sorted.forEach(function(wk){
var wkEx=weeks[wk];var dates=Array.from(new Set(wkEx.map(function(e){return e.date})));
var total=wkEx.reduce(function(s,e){return s+e.amount},0);
var cats={};wkEx.forEach(function(e){cats[e.cat]=(cats[e.cat]||0)+e.amount});
html+='<div class="period-block"><div class="period-header"><span class="period-title">馃搳 '+formatWeek(dates)+'</span><span class="period-total">鍏?+total.toFixed(2)+'鍏?/span></div><div class="period-cats">';
CATEGORIES.forEach(function(cat){if(cats[cat])html+='<span class="period-cat">'+cat+'锛?+cats[cat].toFixed(2)+'鍏?/span>'});
html+='</div></div>';
});
document.getElementById('viewWeekly').innerHTML=html;
}
var selectedMonth=todayStr().slice(0,7);
function renderMonthly(){
var months=Array.from(new Set(expenses.map(function(e){return e.date.slice(0,7)}))).sort().reverse();
if(!months.length)return;
document.getElementById('monthSelector').innerHTML=months.map(function(m){var p=m.split('-');var active=m===selectedMonth?' active':'';return '<span class="month-chip'+active+'" onclick="selectMonth(\''+m+'\')">'+p[0]+'骞?+parseInt(p[1])+'鏈?/span>'}).join('');
selectMonth(selectedMonth);
}
function selectMonth(m){
selectedMonth=m;
var chips=document.querySelectorAll('.month-chip');
for(var i=0;i<chips.length;i++){var c=chips[i];var p=m.split('-');c.classList.toggle('active',c.textContent.indexOf(p[0]+'骞?+parseInt(p[1])+'鏈?)>=0)}
var monthEx=expenses.filter(function(e){return e.date.slice(0,7)===m});
var total=monthEx.reduce(function(s,e){return s+e.amount},0);
var cats={};monthEx.forEach(function(e){cats[e.cat]=(cats[e.cat]||0)+e.amount});
var html='<div class="period-block"><div class="period-header"><span class="period-title">馃搱 '+m.replace('-','.')+'鏈堝悎璁?/span><span class="period-total">鍏?+total.toFixed(2)+'鍏?/span></div><div class="period-cats" style="margin-bottom:12px">';
CATEGORIES.forEach(function(cat){if(cats[cat])html+='<span class="period-cat">'+cat+'锛?+cats[cat].toFixed(2)+'鍏?/span>'});
html+='</div></div>';
var weeks={};monthEx.forEach(function(e){var wk=getWeekKey(e.date);if(!weeks[wk])weeks[wk]=[];weeks[wk].push(e)});
Object.keys(weeks).sort().forEach(function(wk){var wkEx=weeks[wk];var dates=Array.from(new Set(wkEx.map(function(e){return e.date})));var wkTotal=wkEx.reduce(function(s,e){return s+e.amount},0);var wkCats={};wkEx.forEach(function(e){wkCats[e.cat]=(wkCats[e.cat]||0)+e.amount});html+='<div class="period-block"><div class="period-header"><span class="period-title">馃搳 '+formatWeek(dates)+'</span><span class="period-total">鍏?+wkTotal.toFixed(2)+'鍏?/span></div><div class="period-cats">';CATEGORIES.forEach(function(cat){if(wkCats[cat])html+='<span class="period-cat">'+cat+'锛?+wkCats[cat].toFixed(2)+'鍏?/span>'});html+='</div></div>'});
document.getElementById('monthContent').innerHTML=html;
}
function renderRecentItems(){
var seen={};var recent=[];
for(var i=expenses.length-1;i>=0;i--){var e=expenses[i];var key=e.item+':'+e.cat;if(!seen[key]){seen[key]=true;recent.push({item:e.item,cat:e.cat})}}
recent=recent.slice(0,8);
if(!recent.length){document.getElementById('recentItems').innerHTML='';return}
var html='<div class="title">馃搶 蹇€熻褰?/div><div class="quick-tags">';
recent.forEach(function(r){html+='<span class="quick-tag" onclick="quickAdd(\''+r.item.replace(/'/g,"\\'")+'\',\''+r.cat+'\')">'+r.item+'</span>'});
html+='</div>';
document.getElementById('recentItems').innerHTML=html;
}
function quickAdd(item,cat){
document.getElementById('expItem').value=item;
var chips=document.querySelectorAll('#catSelect .cat-chip');
for(var i=0;i<chips.length;i++)chips[i].classList.remove('active');
var target=document.querySelector('#catSelect [data-cat="'+cat+'"]');
if(target)target.classList.add('active');
selectedCat=cat;
document.getElementById('expAmount').focus();
}
function switchTab(viewId,btn){
var views=document.querySelectorAll('.view');
for(var i=0;i<views.length;i++)views[i].classList.remove('active');
var btns=document.querySelectorAll('.tab-btn');
for(var j=0;j<btns.length;j++)btns[j].classList.remove('active');
document.getElementById(viewId).classList.add('active');
btn.classList.add('active');
}

document.addEventListener('DOMContentLoaded',function(){
document.getElementById('expDate').value=todayStr();
document.getElementById('catSelect').addEventListener('click',function(e){var chip=e.target.closest('.cat-chip');if(!chip)return;var chips=document.querySelectorAll('#catSelect .cat-chip');for(var i=0;i<chips.length;i++)chips[i].classList.remove('active');chip.classList.add('active');selectedCat=chip.dataset.cat});
load();renderAll();
});
</script>
</body>
</html>
